<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#grad4)"/>
  <!-- Grid pattern -->
  <g stroke="#1f1f1f" stroke-width="1" opacity="0.5">
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
    <line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>
  <!-- Neural network visualization -->
  <!-- Input layer -->
  <circle cx="200" cy="120" r="15" fill="#10b981" opacity="0.3"/>
  <circle cx="200" cy="120" r="8" fill="#10b981"/>
  <circle cx="200" cy="200" r="15" fill="#10b981" opacity="0.3"/>
  <circle cx="200" cy="200" r="8" fill="#10b981"/>
  <circle cx="200" cy="280" r="15" fill="#10b981" opacity="0.3"/>
  <circle cx="200" cy="280" r="8" fill="#10b981"/>
  <!-- Hidden layer 1 -->
  <circle cx="350" cy="100" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="350" cy="100" r="6" fill="#10b981"/>
  <circle cx="350" cy="170" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="350" cy="170" r="6" fill="#10b981"/>
  <circle cx="350" cy="240" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="350" cy="240" r="6" fill="#10b981"/>
  <circle cx="350" cy="310" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="350" cy="310" r="6" fill="#10b981"/>
  <!-- Hidden layer 2 -->
  <circle cx="500" cy="140" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="500" cy="140" r="6" fill="#10b981"/>
  <circle cx="500" cy="210" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="500" cy="210" r="6" fill="#10b981"/>
  <circle cx="500" cy="280" r="12" fill="#10b981" opacity="0.3"/>
  <circle cx="500" cy="280" r="6" fill="#10b981"/>
  <!-- Output layer -->
  <circle cx="620" cy="200" r="18" fill="#10b981" opacity="0.3"/>
  <circle cx="620" cy="200" r="10" fill="#10b981"/>
  <!-- Connections -->
  <g stroke="#10b981" stroke-width="1" opacity="0.3">
    <!-- Input to Hidden1 -->
    <line x1="208" y1="120" x2="338" y2="100"/>
    <line x1="208" y1="120" x2="338" y2="170"/>
    <line x1="208" y1="200" x2="338" y2="170"/>
    <line x1="208" y1="200" x2="338" y2="240"/>
    <line x1="208" y1="280" x2="338" y2="240"/>
    <line x1="208" y1="280" x2="338" y2="310"/>
    <!-- Hidden1 to Hidden2 -->
    <line x1="362" y1="100" x2="488" y2="140"/>
    <line x1="362" y1="170" x2="488" y2="140"/>
    <line x1="362" y1="170" x2="488" y2="210"/>
    <line x1="362" y1="240" x2="488" y2="210"/>
    <line x1="362" y1="240" x2="488" y2="280"/>
    <line x1="362" y1="310" x2="488" y2="280"/>
    <!-- Hidden2 to Output -->
    <line x1="512" y1="140" x2="602" y2="200"/>
    <line x1="512" y1="210" x2="602" y2="200"/>
    <line x1="512" y1="280" x2="602" y2="200"/>
  </g>
  <!-- Active signal pulse -->
  <circle cx="400" cy="155" r="4" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="175" r="4" fill="#10b981">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Label bar -->
  <rect x="0" y="400" width="800" height="50" fill="#0f0f0f"/>
  <text x="40" y="432" font-family="system-ui, sans-serif" font-size="14" fill="#10b981" font-weight="600" letter-spacing="2">AI</text>
</svg>
